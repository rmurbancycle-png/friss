<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Valshopper MVP - Mercado del Val</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; gap: 20px; padding: 20px; background: #f4f4f9; }
        .pantalla { flex: 1; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid #e67e22; }
        h2 { color: #333; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        button { background: #e67e22; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .alerta { background: #fff3cd; padding: 10px; margin: 10px 0; border-radius: 4px; border-left: 5px solid #ffc107; }
    </style>
</head>
<body>

    <!-- 1. PANTALLA CLIENTE -->
    <div class="pantalla">
        <h2>📱 App Cliente (Valshopper)</h2>
        <p><b>Cesta Única (Mercado del Val):</b></p>
        <label><input type="checkbox" id="item1"> Mesetarios - Tabla Ibérica</label><br><br>
        <label><input type="checkbox" id="item2"> Vegg's - Hamburguesa Vegana</label><br><br>
        <label><input type="checkbox" id="item3"> El Bombón - Pastel de Nata</label><br><br>
        <input type="text" id="dir" value="Calle Santiago, Valladolid" style="width:90%; padding:5px;"><br><br>
        <button onclick="alert('¡Pedido enviado al Mercado del Val! Comprueba la columna del centro.')">Pedir al Mercado</button>
    </div>

    <!-- 2. PANTALLA COMERCIO -->
    <div class="pantalla" style="border-top-color: #2ecc71;">
        <h2>🏪 Panel Comercios (Del Val)</h2>
        <div class="alerta">🚨 <b>Mesetarios:</b> Preparar Tabla Ibérica</div>
        <div class="alerta">🚨 <b>Vegg's:</b> Preparar Hamburguesa</div>
    </div>

    <!-- 3. PANTALLA RIDER -->
    <div class="pantalla" style="border-top-color: #3498db;">
        <h2>🛵 App Rider (Repartidor)</h2>
        <div class="alerta" style="background: #e3f2fd; border-left-color: #2196f3;">📦 <b>Viaje unificado listo:</b> Recoger en Mercado del Val y llevar a Calle Santiago.</div>
    </div>

</body>
</html>
